name: terraform-validate

on:
  push:
  pull_request:

jobs:
  terraform-fmt:
    name: terraform-fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

  terraform-validate:
    name: terraform-validate (${{ matrix.directory }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        directory:
          - examples/aws/basic
          - examples/aws/private-subnet-with-vpc-endpoints
          - examples/gcp/basic
          - examples/gcp/private-subnet-private-google-access
          - examples/azure/basic
          - examples/azure/private-subnet-no-public-ip
          - examples/multicloud-switcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate
